name: test-coverage
on:
  pull_request:
    branches: [ main, dev_stages ]
  push:
    branches: [ main, dev_stages ]

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: 'release'
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          # R/eventviz-package.R holds only package-level roxygen tags and a
          # globalVariables() declaration - no executable logic to cover.
          # R/example_data.R's make_*() functions build the example/complaint/
          # ticket datasets at package load time, before covr's tracer
          # attaches; they're exercised on every test run (virtually every
          # test consumes example_journey/complaint_example/
          # support_ticket_example) but show as 0% for that reason, a known
          # covr limitation with load-time code rather than a real gap.
          cov <- covr::package_coverage(
            quiet = FALSE,
            clobber = FALSE,
            line_exclusions = list("R/eventviz-package.R", "R/example_data.R")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          # cobertura.xml is created by covr::to_cobertura() above
          files: ./cobertura.xml
          fail_ci_if_error: ${{ github.event_name != 'pull_request' && true || false }}
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
